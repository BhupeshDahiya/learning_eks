apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-autoscaler           
  namespace: argocd # App object data so argocd knows it deployed the app
  finalizers:
    - resources-finalizer.argocd.argoproj.io # so when the metrics server is deleted all child processes get deleted as well
spec:
  project: default
  sources:
    # source 1 for helm chart
    - repoURL: 'https://kubernetes.github.io/autoscaler'
      chart: cluster-autoscaler
      targetRevision: 9.57.0 
      helm:
        valueFiles:
          - $values/environments/dev/autoscaler_values.yaml

    # Source 2 for the values file
    - repoURL: 'https://github.com/BhupeshDahiya/learning_eks' # Change to your Git URL
      targetRevision: HEAD # Or pin to a specific branch like 'main' or a tag or a commit
      ref: values  
    
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true